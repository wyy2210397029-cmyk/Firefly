backend:
  name: github
  repo: wyy2210397029-cmyk/Firefly
  branch: master
  base_url: https://fishction.xyz
  auth_endpoint: /api/auth

local_backend: false

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "博客文章"
    label_singular: "文章"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "published", widget: "date", format: "YYYY-MM-DD" }
      - { label: "简介", name: "description", widget: "text", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "分类", name: "category", widget: "string", required: false }
      - { label: "置顶", name: "pinned", widget: "boolean", default: false, required: false }
      - { label: "允许评论", name: "comment", widget: "boolean", default: true, required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "封面图", name: "image", widget: "image", required: false }
      - { label: "正文", name: "body", widget: "markdown" }

slug:
  encoding: "ascii"
  clean_accents: true
